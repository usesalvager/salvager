name: CI & Release

# CI runs on every push to main and on PRs.
# Release runs only when a v* tag is pushed, and only if CI passed first.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Allow the release job to create a GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  ci:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod   # single source of truth; stays in sync with go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  guard-skip-token:
    name: Guard against accidental CI-skip tokens
    # PR-only guard. A CI-skip directive anywhere in the PR body or a commit
    # message rides into the squash-merge commit and silently skips CI/Release
    # on main — and on any tag pointing at that commit. pull_request is the one
    # event that still fires regardless, so we catch it here. See issue #21.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Scan PR body and commit messages
        shell: bash
        env:
          # Pass untrusted PR text via env, never inline ${{ }} in run — avoids
          # shell injection.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The directives GitHub honors to skip a run, as one alternation.
          pattern='\[(skip ci|ci skip|no ci|skip actions|actions skip)\]|\*\*\*NO_CI\*\*\*'
          found=0
          if printf '%s' "${PR_BODY:-}" | grep -iEn "$pattern"; then
            echo "::error::PR body contains a CI-skip directive (matched above). It would ride into the squash-merge commit and silently skip CI/Release. Rephrase it — see CONTRIBUTING.md."
            found=1
          fi
          msgs="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate --jq '.[].commit.message')"
          if printf '%s' "$msgs" | grep -iEn "$pattern"; then
            echo "::error::A commit message in this PR contains a CI-skip directive (matched above). Reword the commit, or it will silently skip CI/Release after merge — see CONTRIBUTING.md."
            found=1
          fi
          if [ "$found" -ne 0 ]; then
            exit 1
          fi
          echo "No CI-skip directives found in the PR body or commit messages."

  create-release:
    name: Create release
    # Only on a v* tag, and only after CI succeeds. Runs exactly once (no
    # matrix) so the autogenerated release notes are written a single time —
    # the per-arch matrix below only attaches assets, never regenerates notes.
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create release with generated notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release binaries
    # The release already exists (create-release made it); these runners only
    # attach their binaries to it.
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod   # same toolchain as the ci job
          cache: true

      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OUT="salvager-${VERSION}-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags "-s -w -X 'github.com/usesalvager/salvager/version.Version=${VERSION}'" \
            -o "${OUT}" \
            .
          # Checksum alongside the binary for integrity verification.
          sha256sum "${OUT}" > "${OUT}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            salvager-*-${{ matrix.goos }}-${{ matrix.goarch }}
            salvager-*-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-tap:
    name: Bump Homebrew tap
    # After all binaries + checksums are attached, regenerate the formula in the
    # tap repo with the new version and checksums and push it directly. This does
    # NOT touch how binaries are built — it only consumes the checksums the
    # release already produced. Skips cleanly if TAP_PUSH_TOKEN is unset.
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check token is configured
        id: gate
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "${TAP_PUSH_TOKEN}" ]; then
            echo "TAP_PUSH_TOKEN not set — skipping tap bump." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap repo
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          repository: usesalvager/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap

      - name: Render formula
        if: steps.gate.outputs.enabled == 'true'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          ver_no_v="${VERSION#v}"
          base="https://github.com/usesalvager/salvager/releases/download/${VERSION}"

          # Pull each checksum straight from the release we just published.
          dl_sha() {
            curl -fsSL "${base}/salvager-${VERSION}-$1.sha256" | awk '{print $1}'
          }
          darwin_arm="$(dl_sha darwin-arm64)"
          darwin_amd="$(dl_sha darwin-amd64)"
          linux_arm="$(dl_sha linux-arm64)"
          linux_amd="$(dl_sha linux-amd64)"
          for h in "$darwin_arm" "$darwin_amd" "$linux_arm" "$linux_amd"; do
            case "$h" in
              [0-9a-f]*) [ ${#h} -eq 64 ] || { echo "bad sha length: $h" >&2; exit 1; } ;;
              *) echo "missing checksum" >&2; exit 1 ;;
            esac
          done

          mkdir -p tap/Formula
          cat > tap/Formula/salvager.rb <<RUBY
          class Salvager < Formula
            desc "Undo for AI agents — filesystem-level code safety net"
            homepage "https://github.com/usesalvager/salvager"
            version "${ver_no_v}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${base}/salvager-${VERSION}-darwin-arm64"
                sha256 "${darwin_arm}"
              end
              on_intel do
                url "${base}/salvager-${VERSION}-darwin-amd64"
                sha256 "${darwin_amd}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/salvager-${VERSION}-linux-arm64"
                sha256 "${linux_arm}"
              end
              on_intel do
                url "${base}/salvager-${VERSION}-linux-amd64"
                sha256 "${linux_amd}"
              end
            end

            def install
              bin.install Dir["salvager-*"].first => "salvager"
            end

            test do
              assert_match "salvager v#{version}", shell_output("#{bin}/salvager --version")
            end
          end
          RUBY

      - name: Commit and push
        if: steps.gate.outputs.enabled == 'true'
        working-directory: tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          if git diff --quiet -- Formula/salvager.rb; then
            echo "Formula already up to date — nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/salvager.rb
          git commit -m "salvager ${VERSION}"
          git push
